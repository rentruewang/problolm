[project]
name = "problolm"
description = "PR Block LLM - Block low quality PRs generated by LLMs"
authors = [
    {name = "RenChu Wang", email = "patrick1031wang@gmail.com"},
]
dependencies = [
    "rich>=14.3.3",
    "pygit2>=1.19.1",
    "transformers>=4.57.3",
    "torch>=2.9.1",
    "github3-py>=4.0.1",
    "python-dotenv>=1.2.1",
    "gitpython>=3.1.46",
    "fire>=0.7.1",
    "tree-sitter>=0.25.2",
]
requires-python = ">=3.14,<3.15"
readme = "README.md"
license = {text = "MIT"}
dynamic = ["version"]

[project.optional-dependencies]
langs = [
    "tree-sitter-python>=0.25.0",
    "tree-sitter-cpp>=0.23.4",
    "tree-sitter-elixir>=0.3.5",
    "tree-sitter-fortran>=0.5.1",
    "tree-sitter-typescript>=0.23.2",
    "tree-sitter-javascript>=0.25.0",
    "tree-sitter-go>=0.25.0",
    "tree-sitter-rust>=0.24.1",
    "tree-sitter-ruby>=0.23.1",
    "tree-sitter-html>=0.23.2",
    "tree-sitter-css>=0.25.0",
    "tree-sitter-php>=0.24.1",
    "tree-sitter-java>=0.23.5",
    "tree-sitter-c-sharp>=0.23.1",
    "tree-sitter-bash>=0.25.1",
    "tree-sitter-make>=1.1.1",
    "tree-sitter-toml>=0.7.0",
    "tree-sitter-yaml>=0.7.2",
    "tree-sitter-json>=0.24.8",
    "tree-sitter-markdown>=0.5.1",
]

[build-system]
requires = ["setuptools", "wheel", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]


[tool.pdm]
distribution = true

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "isort>=7.0.0",
    "autoflake>=2.3.1",
    "mypy>=1.19.1",
    "black>=25.12.0",
    "nox[pbs]>=2026.2.9",
    "pip>=26.0.1",
]
pytest = [
    "pytest>=9.0.2",
    "pytest-xdist>=3.8.0",
]
jupyter = [
    "jupyter>=1.1.1",
    "jupytext>=1.19.1",
    "ipython>=9.9.0",
    "ipykernel>=7.1.0",
]

[project.scripts]
show = "problolm.commits:git_show_cmd"

[tool.autoflake]
in-place = true
recursive = true
exclude = "__init__.py"
expand-star-imports = true
remove-all-unused-imports = true
remove-duplicate-keys = true

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.mypy]
show_error_codes = true
check_untyped_defs = true

# Skipping analysis for some modules because they are not typed.
[[tool.mypy.overrides]]
module = [
    "fire.*",
    "github3.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = [
    "-v",
    "--ff",
    "--nf",
    "--import-mode=importlib",
    "--dist=loadgroup",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
